<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ظ…ط­ظ„ظ„ ط§ظ„ط¨ط±ظˆط¨ط§ط¬ظ†ط¯ط§ ط§ظ„ط°ظƒظٹ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f3f4f6;
        }

        .analyzer-card {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="p-5 md:p-10">

    <div class="max-w-4xl mx-auto">
        <!-- Settings / API Key -->
        <div class="mb-6 text-right">
            <button onclick="toggleSettings()" class="text-slate-400 hover:text-blue-600 text-sm transition flex items-center justify-end gap-1 ml-auto">
                <span>?? إعدادات API</span>
            </button>
            <div id="settingsPanel" class="hidden mt-2 bg-white p-4 rounded-xl shadow-sm border border-slate-200 text-right">
                <label class="block text-sm font-bold mb-2 text-slate-600">مفتاح Groq API:</label>
                <div class="flex gap-2">
                    <input type="password" id="apiKey" class="flex-1 p-2 border rounded-lg text-sm" placeholder="gsk_...">
                    <button onclick="saveApiKey()" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm hover:bg-slate-700">حفظ</button>
                </div>
                <p class="text-xs text-slate-400 mt-2">يتم حفظ المفتاح محلياً في متصفحك فقط.</p>
            </div>
        </div>

        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-slate-800 mb-2">?? محلل النصوص المضللة</h1>
            <p class="text-slate-600">اكتشف أساليب التلاعب اللغوي والدعاية المدعوم بالذكاء الاصطناعي</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 bg-white p-6 rounded-2xl shadow-lg">
                <label class="block text-lg font-bold mb-3 text-slate-700">أدخل النص المراد تحليله:</label>
                <textarea id="inputText" rows="8"
                    class="w-full p-4 border-2 border-slate-200 rounded-xl focus:border-blue-500 focus:outline-none resize-none"
                    placeholder="اكتب أو الصق النص هنا..."></textarea>

                <button id="analyzeBtn" onclick="analyzeText()"
                    class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition duration-200 flex items-center justify-center gap-2">
                    <span id="btnText">بدء التحليل الذكي</span>
                    <div id="loader" class="hidden animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></div>
                </button>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-lg text-center flex flex-col justify-center border-t-4 border-blue-500">
                <h3 class="text-xl font-bold mb-2">مؤشر التضليل</h3>
                <div id="scoreCircle" class="text-5xl font-black text-slate-300">0%</div>
                <p id="statusText" class="mt-4 text-slate-500 italic">بانتظار النص...</p>
            </div>
        </div>

        <div id="resultsDetail" class="hidden mt-8 bg-white p-6 rounded-2xl shadow-lg border-r-8 border-yellow-400">
            <h3 class="text-xl font-bold mb-4 text-slate-800 underline decoration-yellow-400">التحليل التفصيلي:</h3>
            <div id="aiAnalysis" class="text-slate-700 leading-relaxed space-y-4">
                <!-- AI results here -->
            </div>
        </div>
    </div>

    <script>
        // Load saved key
        document.getElementById('apiKey').value = localStorage.getItem('groq_api_key') || '';

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.classList.toggle('hidden');
        }

        function saveApiKey() {
            const key = document.getElementById('apiKey').value;
            localStorage.setItem('groq_api_key', key);
            alert('تم حفظ المفتاح بنجاح');
            toggleSettings();
        }

        async function analyzeText() {
            const text = document.getElementById('inputText').value;
            const apiKey = localStorage.getItem('groq_api_key');
            
            if (!apiKey) {
                alert("يرجى إدخال مفتاح Groq API أولاً من الإعدادات ??");
                toggleSettings();
                return;
            }

            if (!text.trim()) return alert("الرجاء إدخال نص أولاً");

            // UI Loading State
            const btn = document.getElementById('analyzeBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const scoreElement = document.getElementById('scoreCircle');
            const statusElement = document.getElementById('statusText');
            const detailBox = document.getElementById('resultsDetail');
            const aiBox = document.getElementById('aiAnalysis');

            btn.disabled = true;
            btnText.innerText = "جاري التحليل بالذكاء الاصطناعي...";
            loader.classList.remove('hidden');

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            {
                                role: "system",
                                content: `أنت خبير في كشف البروباجندا والتضليل الإعلامي. حلل النص العربي المقدم بعمق. 
                                يجب أن يتضمن ردك:
                                1. نسبة مئوية للتضليل (0-100).
                                2. شرح للتقنيات المستخدمة (مثل: الشيطنة، العاطفة المفرطة، أنصاف الحقائق).
                                3. النتيجة النهائية للجمهور.
                                اجعل التنسيق بصيغة JSON كالتالي:
                                {"score": 80, "status": "نص متحيز جداً", "reasoning": "نص طويل يشرح الأسباب..."}`
                            },
                            { role: "user", content: text }
                        ],
                        response_format: { type: "json_object" }
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.choices[0].message.content);

                // Update UI
                scoreElement.innerText = result.score + "%";
                scoreElement.className = result.score > 50 ? "text-5xl font-black text-red-600" : "text-5xl font-black text-green-600";
                statusElement.innerText = result.status;
                
                aiBox.innerHTML = result.reasoning.replace(/\n/g, '<br>');
                detailBox.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                alert("حدث خطأ أثناء الاتصال بـ Groq. تأكد من صحة مفتاح API.");
            } finally {
                btn.disabled = false;
                btnText.innerText = "بدء التحليل الذكي";
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
