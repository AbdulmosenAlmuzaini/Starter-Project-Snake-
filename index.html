<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محلل البروباجندا الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f3f4f6;
        }

        .analyzer-card {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="p-5 md:p-10">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-slate-800 mb-2">🔍 محلل النصوص المضللة</h1>
            <p class="text-slate-600">اكتشف أساليب التلاعب اللغوي والدعاية المدعوم بالذكاء الاصطناعي</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 bg-white p-6 rounded-2xl shadow-lg">
                <label class="block text-lg font-bold mb-3 text-slate-700">أدخل النص المراد تحليله:</label>
                <textarea id="inputText" rows="8"
                    class="w-full p-4 border-2 border-slate-200 rounded-xl focus:border-blue-500 focus:outline-none resize-none"
                    placeholder="اكتب أو الصق النص هنا..."></textarea>

                <button id="analyzeBtn" onclick="analyzeText()"
                    class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition duration-200 flex items-center justify-center gap-2">
                    <span id="btnText">بدء التحليل الذكي</span>
                    <div id="loader" class="hidden animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></div>
                </button>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-lg text-center flex flex-col justify-center border-t-4 border-blue-500">
                <h3 class="text-xl font-bold mb-2">مؤشر التضليل</h3>
                <div id="scoreCircle" class="text-5xl font-black text-slate-300">0%</div>
                <p id="statusText" class="mt-4 text-slate-500 italic">بانتظار النص...</p>
            </div>
        </div>

        <div id="resultsDetail" class="hidden mt-8 bg-white p-6 rounded-2xl shadow-lg border-r-8 border-yellow-400">
            <h3 class="text-xl font-bold mb-4 text-slate-800 underline decoration-yellow-400">التحليل التفصيلي:</h3>
            <div id="aiAnalysis" class="text-slate-700 leading-relaxed space-y-4">
                <!-- AI results here -->
            </div>
        </div>
    </div>

    <script>
        async function analyzeText() {
            const text = document.getElementById('inputText').value;
            if (!text.trim()) return alert("الرجاء إدخال نص أولاً");

            // UI Loading State
            const btn = document.getElementById('analyzeBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const scoreElement = document.getElementById('scoreCircle');
            const statusElement = document.getElementById('statusText');
            const detailBox = document.getElementById('resultsDetail');
            const aiBox = document.getElementById('aiAnalysis');

            btn.disabled = true;
            btnText.innerText = "جاري التحليل بالذكاء الاصطناعي...";
            loader.classList.remove('hidden');

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text })
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || "خطأ في الاتصال بالسيرفر");
                }

                const data = await response.json();
                const result = JSON.parse(data.choices[0].message.content);

                // Update UI
                scoreElement.innerText = result.score + "%";
                scoreElement.className = result.score > 50 ? "text-5xl font-black text-red-600" : "text-5xl font-black text-green-600";
                statusElement.innerText = result.status;
                
                aiBox.innerHTML = result.reasoning.replace(/\n/g, '<br>');
                detailBox.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                alert("حدث خطأ: " + error.message);
            } finally {
                btn.disabled = false;
                btnText.innerText = "بدء التحليل الذكي";
                loader.classList.add('hidden');
            }
        }
    </script>
</body>

</html>
